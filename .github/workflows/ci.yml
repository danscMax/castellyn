name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes cancel an in-flight run on the same ref (saves CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only read the repo. The default token would otherwise carry write
# scopes a compromised action could abuse (Codex LOW-03).
permissions:
  contents: read

jobs:
  # Fast feedback: the frontend gates that don't need a Rust toolchain.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check        # svelte-check — type + i18n shape gate (0/0)
      - run: npm run check:i18n    # ru/en/zh leaf-key parity
      - run: npm test              # vitest (i18n parity, outcome, attention)

  # The native gates. Windows because Castellyn ships a Windows Tauri app
  # (WebView2 is preinstalled on the runner — no extra system deps needed).
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      # Pinned to a commit SHA for the same reason as release.yml (no signing key in this job, but the
      # ref should not float). `v1` exists as a tag, but tags move; a SHA does not.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master @ 2026-06-30
        with:
          toolchain: "1.94.0"   # must match rust-toolchain.toml — bump the two together
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # PowerShell static analysis on EVERY tracked script, not just tools/: build_all.ps1, verify.ps1
      # and the notify hook live outside it and are just as capable of breaking a user's machine.
      # Rules and severities come from PSScriptAnalyzerSettings.psd1 so this and verify.ps1 can never
      # disagree. Ordered BEFORE the cargo gates on purpose: while it sat last, a red cargo test meant
      # this step never executed at all, and the lint gate silently did nothing for weeks.
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          # Pin the module version so a compromised/unexpected PSGallery release can't run on the runner
          # under the workflow token (Codex LOW-03). Bump deliberately, not floating.
          Install-Module PSScriptAnalyzer -RequiredVersion 1.22.0 -Force -Scope CurrentUser -SkipPublisherCheck
          $issues = @()
          foreach ($f in (git ls-files '*.ps1' '*.psm1')) {
            $issues += Invoke-ScriptAnalyzer -Path $f -Settings ./PSScriptAnalyzerSettings.psd1
          }
          if ($issues) { $issues | Format-Table Severity, ScriptName, Line, RuleName -AutoSize; throw "PSScriptAnalyzer: $($issues.Count) issue(s)" }
      # generate_context! reads frontendDist (../build), so the lib won't
      # compile — clippy/test included — until the frontend is built.
      - run: npm run build
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
