name: Release

# Build the Windows binaries and attach them to the GitHub Release.
#
# Triggers on `release: published` (NOT on tag push) so it never races with — or
# overwrites — the release notes you write by hand: you publish the release, this
# fans out the build and uploads the assets to it a few minutes later.
# `workflow_dispatch` lets you (re)build against an existing tag to validate the
# pipeline without cutting a new release (`--clobber` just replaces the assets).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and (re)attach assets to (e.g. v0.5.0)
        required: true

permissions:
  contents: write   # upload assets to the release

jobs:
  build:
    runs-on: windows-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"   # match rust-toolchain.toml (1.94 breaks the `time` crate)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Fail before a long build if the version isn't synced across all three manifests + the tag,
      # else the standalone exe (named from the tag) ships next to installers (named from tauri.conf).
      - name: Verify version sync
        shell: pwsh
        run: |
          $tag   = "$env:TAG".TrimStart('v')
          $pkg   = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          Write-Host "tag=$tag package.json=$pkg tauri.conf=$tauri Cargo=$cargo"
          if ($pkg -ne $tauri -or $pkg -ne $cargo -or $pkg -ne $tag) {
            throw "version mismatch — tag=$tag package.json=$pkg tauri.conf=$tauri Cargo=$cargo"
          }
      # tauri build runs `npm run build` (beforeBuildCommand) then bundles every
      # target — standalone exe + NSIS setup + WiX MSI (bundle.targets = "all").
      # The two TAURI_SIGNING_* env vars make the bundler sign the updater artifacts
      # (createUpdaterArtifacts: "v1Compatible") — writes a *-setup.exe.sig used in latest.json.
      # The private key is passwordless, so the password secret may be an empty string.
      - name: Build (signed updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Collect and version the artifacts
        shell: pwsh
        run: |
          $v   = "$env:TAG".TrimStart('v')
          $rel = "src-tauri/target/release"
          $out = "dist-release"
          New-Item -ItemType Directory -Force $out | Out-Null
          # Standalone exe — rename to the published convention.
          Copy-Item "$rel/castellyn.exe" "$out/Castellyn-$v-windows-x64.exe"
          # Installers already carry the right name (Castellyn_<v>_x64-setup.exe / _x64_en-US.msi);
          # glob so a tauri naming tweak doesn't silently drop an asset.
          Copy-Item (Get-ChildItem "$rel/bundle/nsis/*-setup.exe" | Select-Object -First 1) $out
          Copy-Item (Get-ChildItem "$rel/bundle/msi/*.msi"        | Select-Object -First 1) $out
          $files = Get-ChildItem $out
          $files | Format-Table Name, @{n='MB';e={'{0:0.0}' -f ($_.Length/1MB)}}
          # Fail loudly rather than upload a partial set (3 = exe + NSIS + MSI; latest.json is added next).
          if ($files.Count -ne 3) { throw "expected 3 artifacts, found $($files.Count)" }

      # C3: the updater (plugins.updater.endpoint = releases/latest/download/latest.json) needs a manifest
      # pointing at the SIGNED NSIS installer. tauri build wrote <setup>.exe.sig next to it — fold that
      # signature + the eventual release download URL into latest.json. This is the bit tauri-action would
      # otherwise do; we keep the hand-rolled pipeline and just add the manifest.
      - name: Generate updater manifest (latest.json)
        shell: pwsh
        env:
          NOTES: ${{ github.event.release.body }}
        run: |
          $rel  = "src-tauri/target/release"
          $out  = "dist-release"
          $setup = Get-ChildItem "$rel/bundle/nsis/*-setup.exe" | Select-Object -First 1
          $sigPath = "$($setup.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            throw "no updater signature at $sigPath — is TAURI_SIGNING_PRIVATE_KEY set as a repo secret?"
          }
          $sig = (Get-Content $sigPath -Raw).Trim()
          $notes = if ([string]::IsNullOrWhiteSpace($env:NOTES)) { "See the release page for details." } else { $env:NOTES }
          $manifest = [ordered]@{
            version   = "$env:TAG"
            notes     = $notes
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "https://github.com/danscMax/castellyn/releases/download/$env:TAG/$($setup.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content "$out/latest.json" -Encoding utf8
          Write-Host "── latest.json ──"; Get-Content "$out/latest.json"

      - name: Upload to the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:TAG" (Get-ChildItem dist-release | ForEach-Object FullName) --clobber
