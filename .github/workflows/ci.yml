name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes cancel an in-flight run on the same ref (saves CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: the frontend gates that don't need a Rust toolchain.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check        # svelte-check — type + i18n shape gate (0/0)
      - run: npm run check:i18n    # ru/en/zh leaf-key parity
      - run: npm test              # vitest (i18n parity, outcome, attention)

  # The native gates. Windows because Castellyn ships a Windows Tauri app
  # (WebView2 is preinstalled on the runner — no extra system deps needed).
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # Pinned to a commit SHA for the same reason as release.yml (no signing key in this job, but the
      # ref should not float). `v1` exists as a tag, but tags move; a SHA does not.
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master @ 2026-06-30
        with:
          toolchain: "1.93.0"   # match rust-toolchain.toml (1.94 breaks the `time` crate)
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # generate_context! reads frontendDist (../build), so the lib won't
      # compile — clippy/test included — until the frontend is built.
      - run: npm run build
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      # PowerShell static analysis on the maintenance backend (tools/*.ps1 is the script layer the app
      # spawns). Windows runner already has PowerShell; PSScriptAnalyzer is installed per-run.
      - name: PSScriptAnalyzer (tools)
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $issues = Invoke-ScriptAnalyzer -Path tools -Recurse -Severity Warning
          if ($issues) { $issues | Format-Table -AutoSize; throw "PSScriptAnalyzer: $($issues.Count) issue(s)" }
