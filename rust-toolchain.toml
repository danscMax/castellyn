# Pinned, not floating: a toolchain bump has broken this build before (1.94 once hit a trait-coherence
# regression that made the `time` crate fail with E0119 in cookie/tauri-utils), and a pin is what keeps
# a developer machine and CI on the same compiler. Bump deliberately, together with ci.yml.
#
# 2026-07-19: re-checked the 1.94 regression that forced the previous 1.93.0 pin — it is gone
# (`rustup run 1.94.0 cargo check --all-targets` is clean with time 0.3.47), so the workaround was
# retired and the pin moved forward rather than removed.
[toolchain]
channel = "1.94.0"
profile = "minimal"
components = ["rustfmt", "clippy"]
